<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimeX Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
 <!-- WalletConnect (ADD HERE) -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#000;color:#fff;}

.topbar{
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;background:#0b0b0b;border-bottom:1px solid #222;
}

.logo{color:gold;font-size:22px;font-weight:600;letter-spacing:1px}

.connectBtn{
background:linear-gradient(90deg,#ffd700,#ffb700);
color:#000;border:none;padding:10px 18px;border-radius:8px;font-weight:bold;cursor:pointer;
}

.container{max-width:1200px;margin:auto;padding:20px;}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat{
background:linear-gradient(180deg,#111,#0a0a0a);
border:1px solid rgba(255,215,0,0.25);
border-radius:14px;padding:18px;text-align:center;
box-shadow:0 0 20px rgba(255,215,0,0.08);
}

.stat i{color:gold;font-size:20px;margin-bottom:6px;display:block}
.stat span{color:gold;font-size:20px;font-weight:bold}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}

.card{
background:linear-gradient(180deg,#0d0d0d,#080808);
border:1px solid rgba(255,215,0,0.25);
box-shadow:0 0 25px rgba(255,215,0,0.08);
padding:20px;border-radius:14px;
}

h3{color:gold;margin-top:0}
h3 i{color:gold;margin-right:6px;}
  
*{
box-sizing:border-box;
   }
input,select{
width:100%;
max-width:100%;
padding:12px;
background:#000;
border:1px solid #333;
color:#fff;
border-radius:8px;
}
  
button{
padding:12px;border:none;border-radius:8px;background:gold;font-weight:bold;
cursor:pointer;width:100%;margin-top:8px;
}

.refBox{background:#000;padding:10px;border-radius:8px;border:1px solid #333;margin-top:10px;}

.adminPanel{
margin-top:30px;background:linear-gradient(180deg,#111,#080808);
padding:20px;border-radius:16px;border:1px solid rgba(255,215,0,0.5);
display:none;
}

table{width:100%;border-collapse:collapse;margin-top:10px;}
td,th{border:1px solid #333;padding:8px;text-align:center;}

@media(max-width:500px){
.stats{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">DMX Dashboard</div>
<button class="connectBtn" onclick="connect()">Connect Wallet</button>
</div>

<div class="container">

<!-- STATS TOP -->
<div class="stats">

<div class="stat"><i class="fa-solid fa-wallet"></i>Total Stake<span id="totalStake">0</span></div>
<div class="stat"><i class="fa-solid fa-coins"></i>Daily Rewards<span id="daily">0</span></div>
<div class="stat"><i class="fa-solid fa-chart-line"></i>Total Earned<span id="earned">0</span></div>
<div class="stat"><i class="fa-solid fa-user-plus"></i>Direct Income<span id="directIncome">0</span></div>
<div class="stat"><i class="fa-solid fa-sitemap"></i>Level Income<span id="levelIncome">0</span></div>
<div class="stat"><i class="fa-solid fa-users"></i>Team Count<span id="teamCount">0</span></div>

</div>

<div class="grid">

<!-- STAKE -->
<div class="card">
<h3><i class="fa-solid fa-coins"></i> Stake</h3>

<select id="token">
<option>USDT BEP20</option>
<option>DMX</option>
</select>

<input id="amount" placeholder="Enter amount">

<select id="duration">
<option>90 days (0.20%)</option>
<option>180 days (0.25%)</option>
<option>365 days (0.30%)</option>
</select>

<button onclick="approve()">Approve</button>
<button onclick="stake()">Stake</button>
</div>

<!-- CLAIM -->
<div class="card">
<h3><i class="fa-solid fa-gift"></i> Claim</h3>

<input value="0.00" id="claimable">
<button onclick="claim()">Claim</button>
<button onclick="restake()">Restake</button>
</div>

<!-- REFERRAL -->
<div class="card">
<h3><i class="fa-solid fa-link"></i> Referral Link</h3>

<input id="refLink" readonly value="Connect wallet first">
<button onclick="copyRef()">Copy Link</button>
</div>

<!-- DOWNLINE -->
<div class="card">
<h3><i class="fa-solid fa-network-wired"></i> Downline</h3>
<button onclick="toggleDownline()">View Downline</button>

<div id="downlineBox" style="display:none;">
<table>
<tr><th>Wallet</th><th>Stake</th></tr>
<tr><td>-</td><td>-</td></tr>
</table>
</div>
</div>

</div>

<!-- CLAIM HISTORY -->
<div class="card">
<h3><i class="fa-solid fa-clock"></i> Claim History</h3>

<button onclick="toggleHistory()">View Claim History</button>

<div id="historyBox" style="display:none;">
<table>
<tr><th>Date</th><th>Amount</th></tr>
<tr><td>-</td><td>-</td></tr>
</table>
</div>

</div>

<!-- ADMIN -->
<div class="adminPanel" id="admin">
<h3>Admin Panel</h3>

<div class="stats">
<div class="stat"><i class="fa-solid fa-users"></i>Users<span>0</span></div>
<div class="stat"><i class="fa-solid fa-wallet"></i>Total Stake<span>0</span></div>
<div class="stat"><i class="fa-solid fa-coins"></i>Rewards<span>0</span></div>
</div>

<button>Pause Staking</button>
<button>Adjust Rewards</button>
</div>

<!-- CONTRACTS -->
<div class="card">
<h3><i class="fa-solid fa-file-contract"></i> Contracts</h3>

<b>DMX Token</b>
<div class="refBox">
<input id="dmxAddress" value="PASTE AFTER DEPLOY" readonly>
<button onclick="copyAddress('dmxAddress')">Copy</button>
</div>

<b>Staking</b>
<div class="refBox">
<input id="stakeAddress" value="PASTE AFTER DEPLOY" readonly>
<button onclick="copyAddress('stakeAddress')">Copy</button>
</div>

<b>LP</b>
<div class="refBox">
<input id="lpAddress" value="AFTER LP" readonly>
<button onclick="copyAddress('lpAddress')">Copy</button>
</div>

<b>Router</b>
<div class="refBox">
<input id="routerAddress" value="0x10ED43C718714eb63d5aA57B78B54704E256024E" readonly>
<button onclick="copyAddress('routerAddress')">Copy</button>
</div>

</div>

</div>

<script>

let provider;
let signer;
let adminWallet="0x53ba2d865be750d0e2d4d01bcb0a46ec1684c46b";

async function connect(){

// MetaMask / Injected
if (window.ethereum) {
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    const addr = await signer.getAddress();
    afterConnect(addr);
    return;
}

// WalletConnect v2
if (window.EthereumProvider) {

    const wc = await window.EthereumProvider.init({
        projectId: "30cfec2651a089d32f1a5b62b3aa8c81",
        chains: [56], // BSC Mainnet
        showQrModal: true,
    });

    await wc.connect();

    provider = new ethers.providers.Web3Provider(wc);
    signer = provider.getSigner();
    const addr = await signer.getAddress();

    afterConnect(addr);
}
}

function afterConnect(addr){

document.getElementById("refLink").value =
"https://dimex.app/?ref=" + addr;

if(addr.toLowerCase()==adminWallet.toLowerCase()){
document.getElementById("admin").style.display="block";
}

alert("Connected: " + addr);
}

function approve(){alert("Approve ready")}
function stake(){alert("Stake ready")}
function claim(){alert("Claim ready")}
function restake(){alert("Restake ready")}

function toggleDownline(){
let box=document.getElementById("downlineBox");
box.style.display=box.style.display==="none"?"block":"none";
}

function toggleHistory(){
let box=document.getElementById("historyBox");
box.style.display = box.style.display === "none" ? "block" : "none";
}

function copyAddress(id){
let val=document.getElementById(id).value;
navigator.clipboard.writeText(val);
alert("Copied");
}

function copyRef(){
let val=document.getElementById("refLink").value;
navigator.clipboard.writeText(val);
alert("Copied");
}

</script>

</body>
</html>
