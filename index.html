<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DimeX Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#000;color:#fff}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#0b0b0b;border-bottom:1px solid #222}
.logoWrap{display:flex;align-items:center;gap:10px}
.logoWrap img{width:40px}
.logoText{color:gold;font-size:20px;font-weight:600}
.connectBtn{background:linear-gradient(90deg,#ffd700,#ffb700);color:#000;border:none;padding:10px 18px;border-radius:8px;font-weight:bold;cursor:pointer}
.container{max-width:1200px;margin:auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:25px}
.stat{background:#111;border:1px solid rgba(255,215,0,0.3);border-radius:14px;padding:18px;text-align:center}
.stat i{color:gold;font-size:20px;margin-bottom:6px;display:block}
.stat span{color:gold;font-size:20px;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#111;border:1px solid rgba(255,215,0,0.3);padding:20px;border-radius:14px}
h3{color:gold;margin-top:0}
input,select{width:100%;padding:12px;background:#000;border:1px solid #333;color:#fff;border-radius:8px;margin-top:10px}
button{padding:12px;border:none;border-radius:8px;background:gold;font-weight:bold;cursor:pointer;width:100%;margin-top:10px}
button:disabled{opacity:0.6;cursor:not-allowed}
.contractRow{display:flex;justify-content:space-between;align-items:center;background:#000;padding:12px;margin:8px 0;border:1px solid #222;border-radius:8px}
.contractRow button{width:auto;padding:8px 14px}
.adminPanel{display:none;margin-top:20px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>

<div class="topbar">
<div class="logoWrap">
<img src="https://i.ibb.co/HpqwGFqt/logo.png">
<div class="logoText">DimeX Dashboard</div>
</div>
<button class="connectBtn" onclick="connectWallet()">Connect Wallet</button>
</div>

<div class="container">

<div id="walletDisplay" style="margin-bottom:15px;color:gold"></div>

<div class="stats">
<div class="stat"><i class="fa-solid fa-wallet"></i>Total Stake<span id="totalStake">0</span></div>
<div class="stat"><i class="fa-solid fa-bolt"></i>Daily Reward<span id="dailyReward">0</span></div>
<div class="stat"><i class="fa-solid fa-chart-line"></i>Total Earned<span id="totalIncome">0</span></div>
<div class="stat"><i class="fa-solid fa-user-plus"></i>Direct Income<span id="directIncome">0</span></div>
<div class="stat"><i class="fa-solid fa-sitemap"></i>Level Income<span id="levelIncome">0</span></div>
<div class="stat"><i class="fa-solid fa-users"></i>Team Count<span id="teamCount">0</span></div>
</div>

<div class="grid">

<div class="card">
<h3>Stake</h3>
<select id="token">
<option value="USDT">USDT</option>
<option value="DMX">DMX</option>
</select>
<input id="amount" placeholder="Enter amount">
<option value="" disabled selected>Select Duration</option>
<option value="90">90 Days - 0.20% Daily</option>
<option value="180">180 Days - 0.25% Daily</option>
<option value="365">365 Days - 0.30% Daily</option>
</select>
<button id="approveBtn" onclick="approveToken()">Approve</button>
<button id="stakeBtn" onclick="stakeToken()">Stake</button>
</div>

<div class="card">
<h3>Claim</h3>
<input id="claimable" readonly>
<button id="claimBtn" onclick="claimRewards()">Claim</button>
<button id="restakeBtn" onclick="restakeRewards()">Restake</button>
</div>

</div>

<div class="card">
<h3>Ecosystem</h3>
<div class="contractRow"><span>DMX Token</span><button onclick="viewAddress(DMX)">View</button></div>
<div class="contractRow"><span>Staking</span><button onclick="viewAddress(STAKING_ADDRESS)">View</button></div>
<div class="contractRow"><span>LP Pair</span><button onclick="viewAddress(LP)">View</button></div>
<div class="contractRow"><span>Router</span><button onclick="viewAddress(ROUTER)">View</button></div>
</div>

<div class="adminPanel" id="adminPanel">
<div class="card">
<h3>Admin Panel</h3>
<div>Admin Connected</div>
</div>
</div>

</div>

<script>

let provider, signer, userAddress;

const ADMIN="0x53ba2d865be750d0e2d4d01bcb0a46ec1684c46b";
const USDT="0x55d398326f99059fF775485246999027B3197955";
const DMX="PUT_DMX_TOKEN";
const STAKING_ADDRESS="PUT_STAKING_CONTRACT";
const LP="PUT_LP_ADDRESS";
const ROUTER="0x10ED43C718714eb63d5aA57B78B54704E256024E";

const ERC20_ABI=["function approve(address,uint256) external returns(bool)"];
const STAKE_ABI=[
"function stakeUSDT(uint256,uint256,address) external",
"function stakeDMX(uint256,uint256,address) external",
"function claim() external",
"function restake() external",
"function getUserInfo(address) view returns(uint256,uint256,uint256,uint256,uint256,uint256)",
"function getClaimable(address) view returns(uint256)"
];

function disableBtn(id,state){document.getElementById(id).disabled=state;}

function validateAmount(val){
if(!val || isNaN(val)) return false;
if(Number(val)<=0) return false;
return true;
}

function convertDuration(days){
return Number(days)*24*60*60;
}

async function connectWallet(){
try{
if(window.ethereum){
provider=new ethers.providers.Web3Provider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
window.ethereum.on("chainChanged",()=>location.reload());
}else{
const wc=new WalletConnectProvider.default({rpc:{56:"https://bsc-dataseed.binance.org/"}});
await wc.enable();
provider=new ethers.providers.Web3Provider(wc);
}
const network=await provider.getNetwork();
if(network.chainId!==56){alert("Switch to BSC Mainnet");return;}
signer=provider.getSigner();
userAddress=await signer.getAddress();
document.getElementById("walletDisplay").innerHTML="Connected: "+userAddress;
if(userAddress.toLowerCase()===ADMIN.toLowerCase()){
document.getElementById("adminPanel").style.display="block";
}
await loadUserData();
}catch(e){alert(e.message||"Connection failed");}
}

async function loadUserData(){
try{
const contract=new ethers.Contract(STAKING_ADDRESS,STAKE_ABI,provider);
const info=await contract.getUserInfo(userAddress);
const claimable=await contract.getClaimable(userAddress);
document.getElementById("totalStake").innerHTML=ethers.utils.formatUnits(info[0],18);
document.getElementById("dailyReward").innerHTML=ethers.utils.formatUnits(info[1],18);
document.getElementById("totalIncome").innerHTML=ethers.utils.formatUnits(info[2],18);
document.getElementById("directIncome").innerHTML=ethers.utils.formatUnits(info[3],18);
document.getElementById("levelIncome").innerHTML=ethers.utils.formatUnits(info[4],18);
document.getElementById("teamCount").innerHTML=info[5];
document.getElementById("claimable").value=ethers.utils.formatUnits(claimable,18);
}catch(e){console.log("Read failed",e);}
}

async function approveToken(){
try{
const amount=document.getElementById("amount").value;
if(!validateAmount(amount)) return alert("Invalid amount");
disableBtn("approveBtn",true);
const tokenType=document.getElementById("token").value;
const tokenAddr=tokenType==="USDT"?USDT:DMX;
const token=new ethers.Contract(tokenAddr,ERC20_ABI,signer);
const tx=await token.approve(STAKING_ADDRESS,ethers.utils.parseUnits(amount,18));
await tx.wait();
alert("Approved");
}catch(e){alert(e.reason||e.message);}
disableBtn("approveBtn",false);
}

async function stakeToken(){
try{
const amount=document.getElementById("amount").value;
if(!validateAmount(amount)) return alert("Invalid amount");
disableBtn("stakeBtn",true);
const duration=convertDuration(document.getElementById("duration").value);
const tokenType=document.getElementById("token").value;
const urlParams=new URLSearchParams(window.location.search);
const ref=urlParams.get("ref")||ethers.constants.AddressZero;
const contract=new ethers.Contract(STAKING_ADDRESS,STAKE_ABI,signer);
let tx;
if(tokenType==="USDT"){
tx=await contract.stakeUSDT(ethers.utils.parseUnits(amount,18),duration,ref);
}else{
tx=await contract.stakeDMX(ethers.utils.parseUnits(amount,18),duration,ref);
}
await tx.wait();
alert("Stake successful");
await loadUserData();
}catch(e){alert(e.reason||e.message);}
disableBtn("stakeBtn",false);
}

async function claimRewards(){
try{
disableBtn("claimBtn",true);
const contract=new ethers.Contract(STAKING_ADDRESS,STAKE_ABI,signer);
const tx=await contract.claim();
await tx.wait();
alert("Claimed");
await loadUserData();
}catch(e){alert(e.reason||e.message);}
disableBtn("claimBtn",false);
}

async function restakeRewards(){
try{
disableBtn("restakeBtn",true);
const contract=new ethers.Contract(STAKING_ADDRESS,STAKE_ABI,signer);
const tx=await contract.restake();
await tx.wait();
alert("Restaked");
await loadUserData();
}catch(e){alert(e.reason||e.message);}
disableBtn("restakeBtn",false);
}

function viewAddress(addr){
if(!addr||addr.includes("PUT")){alert("Address not set");return;}
window.open("https://bscscan.com/address/"+addr,"_blank");
}

</script>

</body>
</html>
